name: Publish Workflow

run-name: ${{ github.actor }} is publishing lagom-ui

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # .npmrc (committed at repo root) authenticates the @fcongson scope against
      # npm.pkg.github.com via `${TOKEN}` for every registry request, not just
      # publish - lagom-tokens is itself a private/scoped GitHub Packages
      # dependency owned by a different repo, so `pnpm install` needs this too,
      # not only `npm publish`. Uses the automatic per-run GITHUB_TOKEN rather
      # than a manually-created PAT - both repos are owned by the same account,
      # and lagom-tokens' package settings grant this repo read access
      # (Package settings -> Manage Actions access -> lagom-ui).
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          # Storybook 10 requires Node >= 20.19 or >= 22.12.
          node-version: "20"
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Publish package
        run: npm publish
