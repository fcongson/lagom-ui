name: CI

run-name: ${{ github.actor }} is verifying lagom-ui

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      # See publish.yml: the committed .npmrc authenticates the @fcongson scope
      # against npm.pkg.github.com via `${TOKEN}` for every install, since
      # lagom-tokens is itself a private/scoped GitHub Packages dependency
      # owned by a different repo. Uses the automatic per-run GITHUB_TOKEN -
      # lagom-tokens' package settings grant this repo read access
      # (Package settings -> Manage Actions access -> lagom-ui).
      TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          # Storybook 10 requires Node >= 20.19 or >= 22.12, but tsdown 0.22's
          # own engines field requires Node ^22.18.0 || >=24.11.0 (it needs a
          # native TS-config loader newer than Node 20 provides, and its
          # "unrun" fallback isn't installed) - use 22, which satisfies both.
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Build Storybook
        run: pnpm build-storybook
